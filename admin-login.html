<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Owner Login | Azad Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <style>
        body { margin:0; padding:20px; background:#FFF8E1; font-family:'Mukta',sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; }
        .store-logo { text-align:center; color:#E65100; margin-bottom:36px; }
        .store-logo i { font-size:64px; margin-bottom:8px; display:block; }
        .store-logo h1 { font-size:26px; font-weight:700; margin:0 0 4px; }
        .store-logo h2 { font-size:17px; color:#2E7D32; font-weight:600; margin:0; }
        .login-box { background:#fff; width:100%; max-width:400px; padding:32px 24px; border-radius:24px; box-shadow:0 10px 30px rgba(0,0,0,.08); }
        .owner-badge { text-align:center; background:#fff8e1; color:#E65100; border:2px solid #ffcc02; padding:8px 18px; border-radius:20px; font-size:14px; font-weight:700; margin-bottom:28px; display:block; }
        .input-group { margin-bottom:20px; }
        .input-group label { display:block; font-weight:700; font-size:16px; color:#444; margin-bottom:8px; }
        input[type=email], input[type=password] { width:100%; padding:18px 16px; font-size:18px; border:2px solid #ddd; border-radius:14px; box-sizing:border-box; font-family:'Mukta',sans-serif; outline:none; transition:border-color .2s; }
        input:focus { border-color:#E65100; }
        .big-btn { width:100%; background:#E65100; color:white; border:none; padding:20px; font-size:22px; font-weight:700; border-radius:14px; margin-top:8px; cursor:pointer; font-family:'Mukta',sans-serif; transition:background .2s; }
        .big-btn:hover { background:#c84600; }
        .big-btn:disabled { background:#ccc; cursor:not-allowed; }
        .forgot { text-align:center; display:block; margin-top:20px; color:#888; font-size:15px; text-decoration:none; }
        .forgot:hover { color:#E65100; }
        .error-box { background:#fee2e2; color:#dc2626; padding:12px 16px; border-radius:10px; margin-bottom:16px; font-size:15px; display:none; white-space:pre-line; }
        .success-box { background:#dcfce7; color:#16a34a; padding:12px 16px; border-radius:10px; margin-bottom:16px; font-size:15px; display:none; }
        .footer-note { margin-top:24px; font-size:12px; color:#bbb; text-align:center; }
        #set-password-section { display:none; }
    </style>
</head>
<body>

<div class="store-logo">
    <i class="fas fa-store"></i>
    <h1>Azad Provision Store</h1>
    <h2>આઝાદ પ્રોવિઝન સ્ટોર</h2>
</div>

<div class="login-box">

    <!-- ── Normal login ── -->
    <div id="login-section">
        <span class="owner-badge">🔐 Owner Login / માલિક લૉગિન</span>
        <div class="error-box" id="error-box"></div>
        <form id="login-form">
            <div class="input-group">
                <label>Email / ઈ-મેઈલ</label>
                <input type="email" id="email" placeholder="your@email.com" autocomplete="email" required />
            </div>
            <div class="input-group">
                <label>Password / પાસવર્ડ</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
            </div>
            <button type="submit" class="big-btn" id="btn-login">
                Enter / લૉગિન <i class="fas fa-arrow-right"></i>
            </button>
        </form>
        <a href="#" class="forgot" onclick="forgotPassword(); return false;">
            Forgot Password? (પાસવર્ડ ભૂલી ગયા?)
        </a>
    </div>

    <!-- ── Set / Reset password (invite & recovery) ── -->
    <div id="set-password-section">
        <span class="owner-badge" id="set-badge">🔑 Create Your Password</span>
        <div class="error-box" id="set-error-box"></div>
        <div class="success-box" id="set-success-box"></div>
        <form id="set-password-form">
            <div class="input-group">
                <label>New Password / નવો પાસવર્ડ</label>
                <input type="password" id="new-password" placeholder="Min 8 characters" autocomplete="new-password" required minlength="8" />
            </div>
            <div class="input-group">
                <label>Confirm Password / ફરી લખો</label>
                <input type="password" id="confirm-password" placeholder="Repeat password" autocomplete="new-password" required minlength="8" />
            </div>
            <button type="submit" class="big-btn" id="btn-set">
                Set Password &amp; Login <i class="fas fa-check"></i>
            </button>
        </form>
    </div>

</div>

<div class="footer-note">Only the store owner can log in here.</div>

<script>
(async function init() {

    // ── 1. Check for invite / recovery token in URL hash ──────────────────
    const hash = window.location.hash;
    const params = new URLSearchParams(hash.replace(/^#/, ''));
    const tokenType = params.get('type');   // 'invite' | 'recovery' | 'magiclink'
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    const hashError = params.get('error');

    if (hashError) {
        showError('error-box', params.get('error_description') || 'Link expired. Please request a new one.');
        return;
    }

    if (accessToken && (tokenType === 'invite' || tokenType === 'recovery')) {
        // Establish session from the token in the URL
        const { error: sessionError } = await sb.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken || ''
        });
        if (sessionError) {
            showError('error-box', 'Link expired or invalid. Please request a new password reset email.');
            return;
        }
        // Show set-password form
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('set-password-section').style.display = 'block';
        if (tokenType === 'invite') {
            document.getElementById('set-badge').textContent = '🔑 Create Your Admin Password';
        } else {
            document.getElementById('set-badge').textContent = '🔑 Reset Your Password';
        }
        // Clear hash from URL so refresh doesn't re-process it
        history.replaceState(null, '', window.location.pathname);
        return;
    }

    // ── 2. Already logged in as admin → skip straight to dashboard ────────
    const { data: { session } } = await sb.auth.getSession();
    if (session?.user?.user_metadata?.role === 'admin') {
        window.location.href = 'admin-dashboard.html';
    }
})();

// ── Set-password form submit ───────────────────────────────────────────────
document.getElementById('set-password-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-set');
    const errEl = document.getElementById('set-error-box');
    const sucEl = document.getElementById('set-success-box');
    errEl.style.display = 'none';
    sucEl.style.display = 'none';

    const newPw = document.getElementById('new-password').value;
    const confirmPw = document.getElementById('confirm-password').value;
    if (newPw !== confirmPw) {
        showError('set-error-box', 'Passwords do not match. / પાસવર્ડ મેળ ખાતા નથી.');
        return;
    }

    btn.disabled = true;
    btn.innerHTML = 'Saving... <i class="fas fa-spinner fa-spin"></i>';

    // Set password AND ensure admin role in metadata
    const { data, error } = await sb.auth.updateUser({
        password: newPw,
        data: { role: 'admin' }
    });

    if (error) {
        showError('set-error-box', error.message);
        btn.disabled = false;
        btn.innerHTML = 'Set Password &amp; Login <i class="fas fa-check"></i>';
        return;
    }

    sucEl.textContent = 'Password set! Redirecting to dashboard...';
    sucEl.style.display = 'block';
    setTimeout(() => { window.location.href = 'admin-dashboard.html'; }, 1200);
});

// ── Normal login form submit ───────────────────────────────────────────────
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    const errEl = document.getElementById('error-box');
    errEl.style.display = 'none';
    btn.disabled = true;
    btn.innerHTML = 'Logging in... <i class="fas fa-spinner fa-spin"></i>';

    const { data, error } = await sb.auth.signInWithPassword({
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
    });

    if (error || data?.user?.user_metadata?.role !== 'admin') {
        if (data?.user) await sb.auth.signOut();
        showError('error-box', 'Wrong email or password.\nખોટો ઈ-મેઈલ અથવા પાસવર્ડ.');
        btn.disabled = false;
        btn.innerHTML = 'Enter / લૉગિન <i class="fas fa-arrow-right"></i>';
        return;
    }

    window.location.href = 'admin-dashboard.html';
});

// ── Forgot password ───────────────────────────────────────────────────────
async function forgotPassword() {
    const email = document.getElementById('email').value.trim();
    if (!email) { alert('Please type your email first.'); return; }
    const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: new URL('admin-login.html', window.location.href).href
    });
    if (!error) {
        alert('Password reset email sent! Check your inbox.');
    } else {
        alert('Error: ' + error.message);
    }
}

function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
}
</script>
</body>
</html>
