<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <title>My Products — Azad Store</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js?v=3"></script>
  <script>window.REQUIRED_ROLE = 'admin';</script>
  <script src="auth-guard.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Mukta', sans-serif;
      background: #FFF8E1;
      min-height: 100vh;
      padding-bottom: 100px;
    }

    .topbar {
      background: #E65100;
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .back-btn { font-size: 24px; background: none; border: none; color: white; cursor: pointer; }
    .topbar-title { font-size: 18px; font-weight: 700; }
    .topbar-sub { font-size: 12px; opacity: .8; }

    .search-bar {
      padding: 12px 16px;
      background: white;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 60px;
      z-index: 90;
    }

    .search-bar input {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      border: 2px solid #e5e5e5;
      border-radius: 12px;
      outline: none;
    }

    .search-bar input:focus { border-color: #E65100; }

    .product-card {
      background: white;
      margin: 12px 16px 0;
      border-radius: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }

    .product-img {
      width: 72px;
      height: 72px;
      border-radius: 12px;
      object-fit: cover;
      background: #f0f0f0;
      flex-shrink: 0;
    }

    .product-info { flex: 1; min-width: 0; }
    .product-name { font-size: 16px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .product-gu { font-size: 13px; color: #888; margin-bottom: 6px; }

    .product-badges { display: flex; gap: 6px; flex-wrap: wrap; }

    .badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }

    .badge-instock  { background: #d1fae5; color: #065f46; }
    .badge-outstock { background: #fee2e2; color: #991b1b; }
    .badge-price    { background: #dbeafe; color: #1e40af; }
    .badge-noprice  { background: #f3f4f6; color: #6b7280; }

    .product-actions { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }

    .btn-edit, .btn-delete {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
    }

    .btn-edit   { background: #eff6ff; }
    .btn-delete { background: #fef2f2; }

    .fab {
      position: fixed;
      bottom: 24px;
      right: 20px;
      background: #2E7D32;
      color: white;
      border: none;
      border-radius: 50px;
      padding: 16px 24px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(34,197,94,.4);
      text-decoration: none;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
    }

    .empty-icon { font-size: 56px; margin-bottom: 12px; }
    .empty-text { font-size: 16px; margin-bottom: 20px; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <button class="back-btn" onclick="history.back()">←</button>
      <div>
        <div class="topbar-title">🗂️ My Products</div>
        <div class="topbar-sub">મારી આઇટમ્સ</div>
      </div>
    </div>
  </div>

  <div class="search-bar">
    <input type="text" id="search-input" placeholder="🔍 Search products..." oninput="filterProducts()" />
  </div>

  <div id="products-list">
    <div class="empty-state"><div class="empty-icon">⏳</div>Loading products...</div>
  </div>

  <a href="admin-add-product.html" class="fab">➕ Add Product</a>

  <script>
    let allProducts = [];

    async function loadProducts() {
      const { data, error } = await sb
        .from('products')
        .select('*, categories(name_en, icon)')
        .eq('is_active', true)
        .order('created_at', { ascending: false });

      allProducts = data || [];
      renderProducts(allProducts);
    }

    function renderProducts(products) {
      const list = document.getElementById('products-list');

      if (!products.length) {
        list.innerHTML = `<div class="empty-state">
          <div class="empty-icon">📦</div>
          <div class="empty-text">No products yet!</div>
          <a href="admin-add-product.html" style="color:#f97316;font-weight:700;">
            ➕ Add your first product
          </a>
        </div>`;
        return;
      }

      list.innerHTML = products.map(p => `
        <div class="product-card" id="card-${p.id}">
          <img class="product-img"
            src="${getImageUrl(p.image_url)}"
            alt="${p.name_en}"
            onerror="this.src='https://placehold.co/72x72/e8e8e8/999?text=No+Photo'"
          />
          <div class="product-info">
            <div class="product-name">${p.name_en}</div>
            ${p.name_gu ? `<div class="product-gu">${p.name_gu}</div>` : ''}
            <div class="product-badges">
              <span class="badge ${p.in_stock ? 'badge-instock' : 'badge-outstock'}">
                ${p.in_stock ? '✅ In Stock' : '❌ Out of Stock'}
              </span>
              <span class="badge ${p.show_price ? 'badge-price' : 'badge-noprice'}">
                ${p.show_price && p.price ? formatPrice(p.price) : 'Ask for Price'}
              </span>
            </div>
          </div>
          <div class="product-actions">
            <button class="btn-edit" onclick="editProduct('${p.id}')" title="Edit">✏️</button>
            <button class="btn-delete" onclick="deleteProduct('${p.id}', '${p.name_en.replace(/'/g, "\\'")}')" title="Delete">🗑️</button>
          </div>
        </div>
      `).join('');
    }

    function filterProducts() {
      const q = document.getElementById('search-input').value.toLowerCase();
      const filtered = allProducts.filter(p =>
        p.name_en.toLowerCase().includes(q) ||
        (p.name_gu && p.name_gu.includes(q))
      );
      renderProducts(filtered);
    }

    function editProduct(id) {
      window.location.href = `admin-add-product.html?edit=${id}`;
    }

    async function deleteProduct(id, name) {
      const confirmed = confirm(
        `Are you sure you want to delete "${name}"?\n\nThis cannot be undone!\n\nKhachi ne? "${name}" delete karvo chhe?`
      );
      if (!confirmed) return;

      // Soft delete
      const { error } = await sb.from('products').update({ is_active: false }).eq('id', id);

      if (error) {
        showToast('Could not delete. Please try again.', 'error');
        return;
      }

      document.getElementById(`card-${id}`)?.remove();
      allProducts = allProducts.filter(p => p.id !== id);
      showToast(`"${name}" deleted successfully.`);

      if (!allProducts.length) renderProducts([]);
    }

    loadProducts();
  </script>
</body>
</html>
